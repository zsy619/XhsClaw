<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff2442;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff4d64;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 外圆 -->
  <circle cx="50" cy="50" r="48" fill="url(#grad1)" />
  
  <!-- 内部装饰 -->
  <circle cx="50" cy="50" r="35" fill="#fff" />
  <circle cx="50" cy="50" r="28" fill="url(#grad1)" />
  
  <!-- 小红书风格的"书"字抽象 -->
  <text x="50" y="62" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#fff" text-anchor="middle">书</text>
</svg>