<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width={{.Width}}, height={{.Height}}">
    <title>小红书封面</title>
    <style>
        @import url('../fonts/noto-sans-sc.css');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans SC', 'Source Han Sans CN', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            width: {{.Width}}px;
            height: {{.Height}}px;
            overflow: hidden;
        }
        
        .cover-container {
            width: {{.Width}}px;
            height: {{.Height}}px;
            background: {{.Background}};
            position: relative;
            overflow: hidden;
        }
        
        .cover-inner {
            position: absolute;
            width: {{.InnerWidth}}px;
            height: {{.InnerHeight}}px;
            left: {{.InnerLeft}}px;
            top: {{.InnerTop}}px;
            background: #F3F3F3;
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            padding: {{.PaddingTop}}px {{.PaddingRight}}px;
        }
        
        .cover-emoji {
            font-size: {{.EmojiSize}}px;
            line-height: 1.2;
            margin-bottom: {{.EmojiMarginBottom}}px;
            {{if .EmojiColor}}color: {{.EmojiColor}};{{end}}
        }
        
        .cover-title {
            font-weight: 900;
            font-size: {{.TitleSize}}px;
            line-height: 1.4;
            {{if .TitleColor}}
            color: {{.TitleColor}};
            {{else}}
            background: {{.TitleGradient}};
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            {{end}}
            flex: 1;
            display: flex;
            align-items: flex-start;
            word-break: break-all;
        }
        
        .cover-subtitle {
            font-weight: 350;
            font-size: {{.SubtitleSize}}px;
            line-height: 1.4;
            color: {{if .SubtitleColor}}{{.SubtitleColor}}{{else}}#000000{{end}};
            margin-top: auto;
        }
    </style>
</head>
<body>
    <div class="cover-container">
        <div class="cover-inner">
            <div class="cover-emoji">{{.Emoji}}</div>
            <div class="cover-title">{{.Title}}</div>
            {{if .Subtitle}}
            <div class="cover-subtitle">{{.Subtitle}}</div>
            {{end}}
        </div>
    </div>
</body>
</html>
