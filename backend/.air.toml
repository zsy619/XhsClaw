# Air 配置文件
# 用于 Go 项目开发时的热重载

# 根目录
root = "."

# 临时文件目录
tmp_dir = "tmp"

# 构建命令
[build]
  # 入口文件
  cmd = "go build -o ./tmp/main ./cmd/server/main.go"
  # 入口点（推荐使用）
  bin = "tmp/main"
  # 是否包含完整的包名
  include_ext = ["go", "tpl", "tmpl", "html"]
  # 排除的目录
  exclude_dir = ["assets", "tmp", "vendor", "testdata"]
  # 排除的文件
  exclude_file = []
  # 排除的扩展名
  exclude_regex = ["_test.go"]
  # 排除未跟踪的文件
  exclude_unchanged = false
  # 延迟
  delay = 1000 # ms
  # 停止时终止旧进程
  stop_on_root = false
  # 发送中断信号的超时时间
  kill_delay = "0s"
  # 发送 SIGTERM 后等待发送 SIGKILL 的时间
  send_interrupt = false

# 日志配置
[log]
  # 日志时间格式
  time = true

# 配色方案
[color]
  build = "yellow"
  main = "magenta"
  watcher = "cyan"

# 监控配置
[misc]
  # 删除临时目录
  clean_on_exit = true

# 环境变量
[env]
  SERVER_PORT = "8000"
  SERVER_MODE = "debug"

# 信号
[signal]
  # 发送给子进程的信号
  kill = "SIGKILL"
